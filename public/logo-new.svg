<svg width="500" height="150" viewBox="0 0 500 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- YSL-inspired ultra-thin serif font -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap');
    text {
      font-family: 'Cormorant Garamond', 'Times New Roman', serif;
    }
  </style>
  
  <!-- FORTUNA text (YSL-style: ultra-thin, ultra-wide spacing) -->
  <text 
    x="250" 
    y="65" 
    font-size="48" 
    font-weight="300" 
    letter-spacing="24" 
    text-anchor="middle" 
    fill="white"
    style="font-family: 'Cormorant Garamond', 'Times New Roman', serif;">
    FORTUNA
  </text>
  
  <!-- Ultra-thin dividing line (YSL signature style) -->
  <line x1="100" y1="90" x2="400" y2="90" stroke="white" stroke-width="0.5" opacity="0.8"/>
  
  <!-- Tagline (refined, minimal spacing) -->
  <text 
    x="250" 
    y="115" 
    font-size="11" 
    font-weight="300" 
    letter-spacing="8" 
    text-anchor="middle" 
    fill="white"
    opacity="0.7"
    style="font-family: 'Helvetica Neue', 'Arial', sans-serif;">
    GIVEFORTUNA.IO
  </text>
</svg>
