<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Twitter Header: YSL-inspired with launch date -->
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#581c87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%">
      <stop offset="0%" style="stop-color:#9333EA;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#headerGrad)"/>
  
  <!-- Glowing effects -->
  <ellipse cx="300" cy="150" rx="400" ry="400" fill="url(#glow1)"/>
  <ellipse cx="1200" cy="350" rx="350" ry="350" fill="url(#glow2)"/>
  
  <!-- Logo -->
  <text x="750" y="180" font-family="serif" font-size="72" font-weight="300" letter-spacing="16" text-anchor="middle" fill="white">
    FORTUNA
  </text>
  
  <!-- Dividing line -->
  <line x1="450" y1="210" x2="1050" y2="210" stroke="white" stroke-width="1" opacity="0.5"/>
  
  <!-- Tagline -->
  <text x="750" y="250" font-family="sans-serif" font-size="20" font-weight="300" letter-spacing="8" text-anchor="middle" fill="white" opacity="0.9">
    PLAY FOR PURPOSE
  </text>
  
  <!-- Launch info -->
  <g opacity="0.8">
    <rect x="580" y="300" width="340" height="80" rx="40" fill="white" fill-opacity="0.1" stroke="white" stroke-width="1" stroke-opacity="0.3"/>
    <text x="750" y="335" font-family="sans-serif" font-size="16" font-weight="500" text-anchor="middle" fill="#A78BFA">
      LAUNCHING
    </text>
    <text x="750" y="365" font-family="sans-serif" font-size="32" font-weight="600" text-anchor="middle" fill="white">
      MAY 1, 2026
    </text>
  </g>
  
  <!-- Bottom features -->
  <g opacity="0.7">
    <text x="450" y="450" font-family="sans-serif" font-size="14" font-weight="500" text-anchor="middle" fill="#A78BFA">
      100% TRANSPARENT
    </text>
    <text x="750" y="450" font-family="sans-serif" font-size="14" font-weight="500" text-anchor="middle" fill="#A78BFA">
      PROVABLY FAIR
    </text>
    <text x="1050" y="450" font-family="sans-serif" font-size="14" font-weight="500" text-anchor="middle" fill="#A78BFA">
      ZERO TRUST
    </text>
  </g>
</svg>
