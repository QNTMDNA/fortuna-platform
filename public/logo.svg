    stroke-width="0.5" 
    opacity="0.6"/>
  
  <!-- Tagline -->
  <text 
    x="400" 
    y="120" 
    font-family="'Helvetica Neue', 'Helvetica', 'Arial', sans-serif" 
    font-size="10" 
    font-weight="400" 
