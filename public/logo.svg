<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Helvetica Neue Bold - 50% reduced spacing -->
  
  <!-- FORTUNA text (letter-spacing reduced from 8px to 4px) -->
