<svg width="800" height="140" viewBox="0 0 800 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Helvetica Neue Bold - Main Logo -->
  
  <!-- FORTUNA - Bold, wide spacing -->
  <text 
    x="400" 
