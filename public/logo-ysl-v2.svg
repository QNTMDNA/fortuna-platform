<svg width="700" height="140" viewBox="0 0 700 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- YSL-inspired logo using system serif fonts (guaranteed to work) -->
  
  <!-- FORTUNA - ultra-thin, ultra-spaced like YSL -->
  <text 
    x="350" 
    y="75" 
    font-family="'Times New Roman', 'Georgia', 'Garamond', serif" 
    font-size="56" 
    font-weight="300" 
    letter-spacing="30" 
    text-anchor="middle" 
    fill="#FFFFFF"
    style="text-transform: uppercase;">
    F O R T U N A
  </text>
  
  <!-- Ultra-thin signature line -->
  <line 
    x1="150" 
    y1="95" 
    x2="550" 
    y2="95" 
    stroke="#FFFFFF" 
    stroke-width="0.5" 
    opacity="0.6"/>
  
  <!-- Refined tagline -->
  <text 
    x="350" 
    y="120" 
    font-family="'Helvetica Neue', 'Arial', sans-serif" 
    font-size="10" 
    font-weight="300" 
    letter-spacing="12" 
    text-anchor="middle" 
    fill="#FFFFFF"
    opacity="0.5">
    G I V E F O R T U N A . I O
  </text>
</svg>
